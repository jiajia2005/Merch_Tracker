<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Merchandise Collection</title>
    <!-- Tailwind CDN - warning is fine for personal use -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#8B5CF6',
                        light: '#F9FAFB',
                        dark: '#1F2937'
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-dark min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-primary mb-2">
                <i class="fa fa-shopping-bag mr-2"></i>My Merchandise Collection
            </h1>
            <p class="text-gray-600">Data saved securely in Supabase — access from any device</p>
        </header>

        <!-- Add New Item Form -->
        <div class="bg-white rounded-xl p-6 mb-8 shadow-md">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <i class="fa fa-plus-circle text-primary mr-2"></i>Add New Merchandise
            </h2>
            
            <form id="merchForm" class="grid md:grid-cols-2 gap-5">
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">IP / Series Name</label>
                    <input type="text" id="ipName" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="e.g. Genshin Impact, Harry Potter">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Item Name</label>
                    <input type="text" id="itemName" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="e.g. Figure, Poster, Badge">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Quantity</label>
                    <input type="number" id="quantity" min="1" value="1" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none">
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Condition</label>
                    <select id="condition" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none">
                        <option value="Mint">Mint / Brand New</option>
                        <option value="Excellent">Excellent</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                        <option value="Damaged">Damaged</option>
                    </select>
                </div>

                <div class="space-y-2 md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Notes (optional)</label>
                    <textarea id="notes" rows="2" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                        placeholder="Purchase date, price, where bought, etc."></textarea>
                </div>

                <div class="space-y-2 md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Upload Photo</label>
                    <input type="file" id="photo" accept="image/*" 
                        class="w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-primary file:text-white hover:file:bg-primary/90">
                    <div id="photoPreview" class="mt-3 hidden rounded-lg overflow-hidden border border-gray-200 max-h-48"></div>
                </div>

                <div class="md:col-span-2">
                    <button type="submit" id="submitBtn"
                        class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-3 px-6 rounded-lg transition-all flex items-center justify-center gap-2">
                        <i class="fa fa-save"></i> Save to Database
                    </button>
                </div>
            </form>
        </div>

        <!-- Collection Display -->
        <div class="bg-white rounded-xl p-6 shadow-md">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <h2 class="text-xl font-semibold flex items-center">
                    <i class="fa fa-th-large text-primary mr-2"></i>My Collection
                </h2>
                
                <div class="w-full sm:w-auto">
                    <select id="filterIP" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none">
                        <option value="all">All IPs</option>
                    </select>
                </div>
            </div>

            <div id="loadingState" class="text-center py-12 text-gray-500">
                <i class="fa fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Loading your collection...</p>
            </div>

            <div id="collectionContainer" class="hidden grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Load local config if exists -->
    <script src="config.js"></script>

    <script>
        // --- Handle config: use local file OR prompt on GitHub Pages ---
        let SUPABASE_URL, SUPABASE_ANON_KEY;

        // Check if config is loaded (works locally)
        if (typeof window.SUPABASE_URL !== 'undefined' && typeof window.SUPABASE_ANON_KEY !== 'undefined') {
            SUPABASE_URL = window.SUPABASE_URL;
            SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
        } else {
            // Running on GitHub Pages: ask user to enter keys once
            alert("Enter your Supabase details to continue. These are only stored temporarily in your browser.");
            SUPABASE_URL = prompt("Enter your Supabase URL (e.g. https://xxx.supabase.co):");
            SUPABASE_ANON_KEY = prompt("Enter your Supabase Anon Key:");

            if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Supabase details required to use this app.</h2>";
            }
        }

        // Initialize Supabase client ONCE only
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Rest of your original code (unchanged) ---
        const form = document.getElementById('merchForm');
        const photoInput = document.getElementById('photo');
        const photoPreview = document.getElementById('photoPreview');
        const collectionContainer = document.getElementById('collectionContainer');
        const loadingState = document.getElementById('loadingState');
        const filterIP = document.getElementById('filterIP');
        const submitBtn = document.getElementById('submitBtn');

        photoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoPreview.innerHTML = `<img src="${event.target.result}" alt="Preview" class="w-full h-full object-contain">`;
                    photoPreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            } else {
                photoPreview.classList.add('hidden');
                photoPreview.innerHTML = '';
            }
        });

        async function uploadPhoto(file) {
            if (!file) return null;
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data, error } = await supabase.storage.from('merch-photos').upload(fileName, file);
            if (error) {
                console.error('Upload error:', error);
                alert('Failed to upload photo: ' + error.message);
                return null;
            }
            const { data: { publicUrl } } = supabase.storage.from('merch-photos').getPublicUrl(fileName);
            return publicUrl;
        }

        async function loadCollection() {
            loadingState.classList.remove('hidden');
            collectionContainer.classList.add('hidden');
            const { data: items, error } = await supabase.from('merchandise').select('*').order('created_at', { ascending: false });
            loadingState.classList.add('hidden');
            if (error) {
                collectionContainer.innerHTML = `<p class="text-red-500 text-center py-8">Error loading data: ${error.message}</p>`;
                collectionContainer.classList.remove('hidden');
                return;
            }
            renderCollection(items);
            updateFilterOptions(items);
            collectionContainer.classList.remove('hidden');
        }

        function updateFilterOptions(items) {
            const uniqueIPs = [...new Set(items.map(item => item.ip_name))].sort();
            filterIP.innerHTML = '<option value="all">All IPs</option>';
            uniqueIPs.forEach(ip => {
                const option = document.createElement('option');
                option.value = ip;
                option.textContent = ip;
                filterIP.appendChild(option);
            });
        }

        function renderCollection(allItems) {
            const selectedIP = filterIP.value;
            const items = selectedIP === 'all' ? allItems : allItems.filter(item => item.ip_name === selectedIP);
            if (items.length === 0) {
                collectionContainer.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <i class="fa fa-box-open text-4xl mb-3"></i>
                        <p>${allItems.length === 0 ? 'Your collection is empty. Add your first merchandise above!' : 'No items found for this IP.'}</p>
                    </div>
                `;
                return;
            }
            collectionContainer.innerHTML = items.map(item => `
                <div class="bg-white border border-gray-100 rounded-xl overflow-hidden shadow hover:shadow-md transition-shadow">
                    ${item.photo_url ? `<img src="${item.photo_url}" alt="${item.item_name}" class="w-full h-48 object-cover">` : `<div class="w-full h-48 bg-gray-100 flex items-center justify-center text-gray-400"><i class="fa fa-image text-4xl"></i></div>`}
                    <div class="p-5">
                        <span class="inline-block bg-primary/10 text-primary text-xs font-medium px-2.5 py-1 rounded mb-2">${item.ip_name}</span>
                        <h3 class="text-lg font-semibold mb-2">${item.item_name}</h3>
                        <div class="space-y-2 text-sm text-gray-600">
                            <p><i class="fa fa-cubes w-5"></i> Quantity: ${item.quantity}</p>
                            <p><i class="fa fa-check-circle w-5"></i> Condition: ${item.condition}</p>
                            ${item.notes ? `<p class="text-gray-700 mt-3 border-t border-gray-100 pt-3">${item.notes}</p>` : ''}
                            <p class="text-xs text-gray-400 mt-3">Added: ${new Date(item.created_at).toLocaleDateString()}</p>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="mt-4 w-full bg-red-50 hover:bg-red-100 text-red-600 text-sm py-2 rounded-lg transition-colors flex items-center justify-center gap-2"><i class="fa fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';
            submitBtn.disabled = true;
            const photoFile = photoInput.files[0];
            const photoUrl = await uploadPhoto(photoFile);
            const newItem = {
                ip_name: document.getElementById('ipName').value.trim(),
                item_name: document.getElementById('itemName').value.trim(),
                quantity: parseInt(document.getElementById('quantity').value),
                condition: document.getElementById('condition').value,
                notes: document.getElementById('notes').value.trim(),
                photo_url: photoUrl
            };
            const { error } = await supabase.from('merchandise').insert([newItem]);
            if (error) alert('Error saving item: ' + error.message);
            else {
                alert('Item saved successfully!');
                form.reset();
                photoPreview.classList.add('hidden');
                await loadCollection();
            }
            submitBtn.innerHTML = '<i class="fa fa-save"></i> Save to Database';
            submitBtn.disabled = false;
        });

        window.deleteItem = async function(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            const { error } = await supabase.from('merchandise').delete().eq('id', id);
            if (error) alert('Error deleting item: ' + error.message);
            else await loadCollection();
        };

        filterIP.addEventListener('change', () => loadCollection());
        window.addEventListener('load', loadCollection);
    </script>
</body>
</html>
